name: Test Sova

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sova-platform/website/package-lock.json
      - name: Synchronize deploy sources
        run: python sova-platform/scripts/sync_sova.py
      - name: Test language and hosted API
        run: |
          python -m unittest discover -s sova/tests -p "test_*.py" -v
          python -m unittest discover -s sova-platform/tests -p "test_*.py" -v
      - name: Build website
        working-directory: sova-platform/website
        run: |
          npm ci
          npm run build
